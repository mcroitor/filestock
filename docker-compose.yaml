services:
  frontend:
    build:
      context: ./
      dockerfile: ./docker/dockerfile.frontend
    ports:
      - "80:80"
    depends_on:
      - backend
  backend:
    build:
      context: ./
      dockerfile: ./docker/dockerfile.backend
    volumes:
      - ./data:/var/www/html/data
      - ./uploads:/var/www/html/uploads
