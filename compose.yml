services:
  backend:
    build: ./backend
    env_file:
      - ".env"
    volumes:
      - ./backend/src:/app/
      - ./backend/db:/app/db
      - ./backend/uploads:/app/uploads
  frontend:
    image: nginx:alpine
    volumes:
      - ./frontend/src:/usr/share/nginx/html:ro
      - ./frontend/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - "8080:80"